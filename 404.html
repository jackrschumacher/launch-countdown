<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Page Not Found</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS VARIABLES (Matches Main App) --- */
        :root {
            --bg-color: #f4f6f8;
            --container-bg: #ffffff;
            --text-main: #2c3e50;
            --text-secondary: #636e72;
            --border-color: #dfe6e9;
            --accent-color: #3498db;
            --accent-hover: #2980b9;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-secondary: #b0b0b0;
            --border-color: #333333;
            --accent-color: #3498db;
            --accent-hover: #5dade2;
            --shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            background-color: var(--container-bg);
            padding: 50px 40px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px; 
            text-align: center;
            transition: background-color 0.3s;
        }

        .error-code {
            font-size: 80px;
            font-weight: 800;
            color: var(--accent-color);
            margin: 0 0 10px 0;
            line-height: 1;
        }

        h2 { 
            margin: 0 0 15px 0; 
            color: var(--text-main); 
            font-size: 1.8rem; 
            font-weight: 700;
        }

        p {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            transition: opacity 0.2s, background-color 0.2s;
            margin-bottom: 30px;
        }

        .btn-home:hover {
            opacity: 0.9;
        }

        .status-container {
            padding-top: 25px;
            border-top: 1px solid var(--border-color);
        }

        .status-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .status-link:hover {
            color: var(--accent-color);
        }

        /* Pulsing status indicator dot */
        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #1abc9c; /* Mint color from your app */
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 rgba(26, 188, 156, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(26, 188, 156, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(26, 188, 156, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(26, 188, 156, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="error-code">404</h1>
        <h2>Page Not Found</h2>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        
        <a href="/" class="btn-home">← Go back</a>
        
        <div class="status-container">
            <a href="https://stats.uptimerobot.com/1Ctp1MdrMI/802507415" target="_blank" rel="noopener noreferrer" class="status-link">
                <span class="status-dot"></span> Check Site Status
            </a>
        </div>
    </div>

    <script>
        // Apply the user's saved theme from the main app so the 404 page doesn't flash bright white on dark mode users
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            document.documentElement.setAttribute('data-theme', 'dark');
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</body>
</html>
